<!DOCTYPE html>
<html>
<head>
<title>Order Confirmation</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<h2 class="text-success">🎉 Order Confirmed!</h2>

<div class="card p-4 mt-3">

<h4>🧾 Bill Details</h4>

<div id="billItems"></div>

<hr>

<h5 id="totalAmount"></h5>

<h4 class="mt-3">📍 Delivery Address</h4>
<p id="address"></p>

<h4>💳 Payment Method</h4>
<p id="payment"></p>

<button class="btn btn-primary mt-3" onclick="goHome()">Back to Home</button>

</div>

<script>

// GET DATA
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let address = localStorage.getItem("address");
let payment = localStorage.getItem("payment");

let billHTML = "";
let total = 0;

cart.forEach(p=>{
billHTML += `<p>${p.name} - $${p.price}</p>`;
total += p.price;
});

document.getElementById("billItems").innerHTML = billHTML;
document.getElementById("totalAmount").innerText = "Total: $" + total;
document.getElementById("address").innerText = address;
document.getElementById("payment").innerText = payment;

function goHome(){
localStorage.removeItem("cart");
window.location.href="index.html";
}

</script>

</body>
</html>
