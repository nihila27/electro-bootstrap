<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sivaniki Electronics</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f3f3f3;font-family:sans-serif;transition:0.3s;}
.dark{background:#121212;color:white;}

.top-bar{display:flex;justify-content:space-between;align-items:center;background:#131921;color:white;padding:10px;}
.logo{font-size:22px;font-weight:bold;}

.search-box{display:flex;width:50%;}
.search-box input{width:100%;padding:8px;}
.search-box button{background:orange;border:none;padding:8px;}

.menu span{margin-left:15px;cursor:pointer;}

.category-bar{background:#232f3e;color:white;padding:10px;text-align:center;}
.category-bar span{margin:0 15px;cursor:pointer;}

.product{
background:white;border-radius:10px;padding:15px;text-align:center;
margin-bottom:20px;box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:0.3s;position:relative;cursor:pointer;
}
.product:hover{transform:scale(1.05);}

.product img{
width:100%;
height:180px;
object-fit:contain;
}

.discount{
position:absolute;top:10px;left:10px;
background:red;color:white;padding:4px 8px;border-radius:5px;
}

.toast{
position:fixed;bottom:20px;right:20px;
background:black;color:white;padding:10px 20px;
border-radius:5px;display:none;
}

#loginBox{
display:none;position:fixed;top:20%;left:35%;
background:white;padding:20px;border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="top-bar">
<div class="logo">🛒 Sivaniki</div>

<div class="search-box">
<input type="text" placeholder="Search..." onkeyup="searchProduct()">
<button>🔍</button>
</div>

<div class="menu">
<span onclick="openLogin()">👤 Login</span>
<span onclick="logout()">🚪 Logout</span>
<span onclick="toggleDark()">🌙</span>
<span onclick="goWishlist()">❤️ Wishlist (<span id="wishCount">0</span>)</span>
<span onclick="window.location.href='order-history.html'">📦 Orders</span>
<span onclick="goCart()">🛒 Cart (<span id="cartCount">0</span>)</span>
</div>
</div>

<div class="category-bar">
<span onclick="filterCategory('watch')">⌚ Watches</span>
<span onclick="filterCategory('camera')">📷 Camera</span>
<span onclick="filterCategory('tv')">📺 TV</span>
<span onclick="filterCategory('laptop')">💻 Laptop</span>
<span onclick="filterCategory('mobile')">📱 Mobile</span>
<span onclick="filterCategory('')">All</span>
</div>

<div class="container mt-4">
<div class="row" id="productContainer"></div>
</div>

<div class="toast" id="toast">Added ✅</div>

<!-- LOGIN -->
<div id="loginBox">
<h4>Login / Signup</h4>
<input id="username" placeholder="Username" class="form-control mb-2">
<input id="password" type="password" placeholder="Password" class="form-control mb-2">

<button class="btn btn-primary" onclick="login()">Login</button>
<button class="btn btn-success" onclick="signup()">Signup</button>
<button class="btn btn-danger" onclick="closeLogin()">Close</button>

<p style="margin-top:10px;">
<a href="#" onclick="showForgot()">Forgot Password?</a>
</p>
</div>
<div id="forgotBox" style="display:none;position:fixed;top:25%;left:35%;background:white;padding:20px;border-radius:10px;box-shadow:0 5px 20px rgba(0,0,0,0.3);z-index:999;">
<h4>Reset Password</h4>
<input id="resetUser" placeholder="Username" class="form-control mb-2">
<input id="newPass" type="password" placeholder="New Password" class="form-control mb-2">
<button class="btn btn-success" onclick="resetPassword()">Reset</button>
<button class="btn btn-danger" onclick="closeForgot()">Close</button>
</div>


<script>

    function signup(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    // validation
    if(username === "" || password === ""){
        alert("Please fill all fields");
        return;
    }

    let formData = new FormData();
    formData.append("username", username);
    formData.append("password", password);

    fetch("signup.php", {
        method: "POST",
        body: formData
    })
    .then(res => res.text())
    .then(data => {
        if(data.trim() === "success"){
    alert("Signup success");
}
else if(data.trim() === "exists"){
    alert("Username already exists");
}
else{
    alert("Signup failed");
}
    });

}

// STORAGE
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

document.getElementById("cartCount").innerText = cart.length;
document.getElementById("wishCount").innerText = wishlist.length;

// PRODUCTS (UNCHANGED)
let defaultProducts = [
{name:"Smart Watch",price:80,img:"https://images.unsplash.com/photo-1546868871-7041f2a55e12",cat:"watch"},
{name:"Camera",price:120,img:"https://images.unsplash.com/photo-1516035069371-29a1b244cc32",cat:"camera"},
{name:"TV",price:50,img:"https://images.unsplash.com/photo-1593305841991-05c297ba4575",cat:"tv"},
{name:"Laptop",price:700,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8",cat:"laptop"},
{name:"Headphones",price:60,img:"https://images.unsplash.com/photo-1580894908361-967195033215",cat:"audio"},
{name:"Power Bank",price:30,img:"https://images.unsplash.com/photo-1609091839311-d5365f9ff1c5",cat:"accessory"},
{name:"Bluetooth Speaker",price:70,img:"https://images.unsplash.com/photo-1545454675-3531b543be5d",cat:"audio"},
{name:"iPhone",price:900,img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9",cat:"mobile"},
{name:"Tablet",price:300,img:"https://images.unsplash.com/photo-1585790050230-5dd28404ccb9",cat:"mobile"},
{name:"Gaming Mouse",price:40,img:"https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7",cat:"accessory"},
{name:"Keyboard",price:50,img:"https://images.unsplash.com/photo-1519389950473-47ba0277781c",cat:"accessory"},
{name:"Electric Bulb",price:15,img:"https://images.unsplash.com/photo-1509395176047-4a66953fd231",cat:"electrical"},
{name:"Ceiling Fan",price:80,img:"https://images.unsplash.com/photo-1582719478250-c89cae4dc85b",cat:"electrical"},
{name:"cusion chair",price:45,img:"https://images.unsplash.com/photo-1598300056393-4aac492f4344",cat:"cusion chair"},
{name:"Men Perfume",price:95,img:"https://images.unsplash.com/photo-1615634260167-c8cdede054de",cat:"perfume"},
{name:"shoe",price:110,img:"https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb",cat:"shoe"},
{name:"Gold Chain",price:500,img:"https://images.unsplash.com/photo-1515562141207-7a88fb7ce338",cat:"jewelry"},
{name:"Silver Chain",price:220,img:"https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f",cat:"jewelry"},
{name:"LED Bulb",price:25,img:"https://images.unsplash.com/photo-1524484485831-a92ffc0de03f?w=500",cat:"electrical"},
{name:"Luxury Perfume",price:120,img:"https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=500",cat:"perfume"},
{name:"Diamond Necklace",price:1500,img:"https://images.unsplash.com/photo-1611652022419-a9419f74343d?w=500",cat:"jewelry"},
{name:"watch",price:1500,img:"https://images.unsplash.com/photo-1524592094714-0f0654e20314?auto=format&fit=crop&w=500&q=60",cat:"watch"},
{name:"Samsung",price:20000,img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=500&q=60",cat:"mobile"},
{name:"Hp lap",price:23000,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8?auto=format&fit=crop&w=500&q=60",cat:"laptop"},
{name:"Wallclock",price:1500,img:"https://images.unsplash.com/photo-1563861826100-9cb868fdbe1c?auto=format&fit=crop&w=500&q=60",cat:"electrical"},
{name:"Mixy",price:550,img:"https://images.unsplash.com/photo-1570222094114-d054a817e56b?auto=format&fit=crop&w=500&q=60",cat:"electrical"},
{name:"lamp",price:650,img:"https://images.unsplash.com/photo-1507473885765-e6ed057f782c?auto=format&fit=crop&w=500&q=60",cat:"electrical"}

];

// ORIGINAL FUNCTIONS (UNCHANGED)
function loadProducts(products = defaultProducts){
let container=document.getElementById("productContainer");
container.innerHTML="";

products.forEach((p,i)=>{

let div=document.createElement("div");
div.className="col-md-4";

div.innerHTML=`
<div class="product" onclick="viewProduct(${i})">
<div class="discount">-20%</div>

<img src="${p.img}">

<h5>${p.name}</h5>
<p>⭐⭐⭐⭐☆</p>
<p><b>$${p.price}</b></p>

<button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); addCart(${i})">Add</button>
<button class="btn btn-success btn-sm" onclick="event.stopPropagation(); buyNow(${i})">Buy</button>
<button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); addWishlist(${i})">❤️</button>
</div>
`;

container.appendChild(div);
});
}

function viewProduct(i){
localStorage.setItem("selectedProduct", JSON.stringify(defaultProducts[i]));
window.location.href="product.html";
}

function openLogin(){document.getElementById("loginBox").style.display="block";}
function closeLogin(){document.getElementById("loginBox").style.display="none";}
function signup(){let user=username.value,pass=password.value;localStorage.setItem("user",JSON.stringify({user,pass}));alert("Signup success");}
function login(){let data=JSON.parse(localStorage.getItem("user"));if(data&&data.user===username.value&&data.pass===password.value){localStorage.setItem("loggedIn",true);alert("Login success");closeLogin();}else alert("Invalid");}
function logout(){localStorage.removeItem("loggedIn");alert("Logged out");}
function toggleDark(){document.body.classList.toggle("dark");}

function addCart(i){cart.push(defaultProducts[i]);localStorage.setItem("cart",JSON.stringify(cart));cartCount.innerText=cart.length;showToast("Added to Cart");}
function goCart(){window.location.href="cart.html";}
function buyNow(i){localStorage.setItem("selectedProduct",JSON.stringify(defaultProducts[i]));window.location.href="checkout.html";}

function addWishlist(i){wishlist.push(defaultProducts[i]);localStorage.setItem("wishlist",JSON.stringify(wishlist));wishCount.innerText=wishlist.length;showToast("Added ❤️");}
function goWishlist(){window.location.href="wishlist.html";}

function showToast(msg){let t=toast;t.innerText=msg;t.style.display="block";setTimeout(()=>t.style.display="none",1500);}

function searchProduct(){let input=document.querySelector(".search-box input").value.toLowerCase();loadProducts(defaultProducts.filter(p=>p.name.toLowerCase().includes(input)));}

function filterCategory(cat){if(cat===""){loadProducts();return;}loadProducts(defaultProducts.filter(p=>p.cat===cat));}

loadProducts();

</script>

<!-- 🔥 IMAGE FIX SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", function(){
let imgs=document.querySelectorAll("img");
imgs.forEach(img=>{
if(img.src.includes("images.unsplash.com") && !img.src.includes("?w=")){
img.src=img.src+"?w=400";
}
img.onerror=function(){
this.src="https://via.placeholder.com/200?text=No+Image";
};
});
});
</script>

<!-- 🔥 NEW FEATURES SCRIPT -->
<script>

// extend products
defaultProducts = defaultProducts.map(p => ({
...p,
rating: Math.floor(Math.random()*5)+1,
stock: Math.floor(Math.random()*10),
oldPrice: p.price + 20,
tag: Math.random()>0.7 ? "Trending" : ""
}));

// override UI
loadProducts = function(products = defaultProducts){
let container=document.getElementById("productContainer");
container.innerHTML="";

products.forEach((p,i)=>{
let div=document.createElement("div");
div.className="col-md-4";

div.innerHTML=`
<div class="product" onclick="viewProduct(${i})">
<div class="discount">-20%</div>
${p.tag ? `<div style="position:absolute;top:10px;right:10px;background:green;color:white;padding:4px;border-radius:5px;">${p.tag}</div>`:""}
<img src="${p.img}">
<h5>${p.name}</h5>
<p>${"⭐".repeat(p.rating)}</p>
<p><strike>$${p.oldPrice}</strike> <b>$${p.price}</b></p>
<p>${p.stock>0?"✅ In Stock":"❌ Out of Stock"}</p>

<button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); addCart(${i})">Add</button>
<button class="btn btn-success btn-sm" onclick="event.stopPropagation(); buyNow(${i})">Buy</button>
<button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); addWishlist(${i})">❤️</button>
</div>
`;
container.appendChild(div);
});
};

// login protection
let oldAddCart = addCart;
addCart = function(i){
if(!localStorage.getItem("loggedIn")) return alert("Login first!");
oldAddCart(i);
};

let oldBuyNow = buyNow;
buyNow = function(i){
if(!localStorage.getItem("loggedIn")) return alert("Login first!");
oldBuyNow(i);
};

// better search
searchProduct = function(){
let input=document.querySelector(".search-box input").value.toLowerCase();
let filtered = defaultProducts.filter(p =>
p.name.toLowerCase().includes(input) || p.cat.toLowerCase().includes(input)
);
loadProducts(filtered);
};

// dark save
let oldToggle = toggleDark;
toggleDark = function(){
oldToggle();
localStorage.setItem("darkMode", document.body.classList.contains("dark"));
};

window.addEventListener("load", ()=>{
if(localStorage.getItem("darkMode")==="true"){
document.body.classList.add("dark");
}
});

// 🔥 FINAL FIX (ADMIN SYNC)
(function(){
let adminProductsFix = JSON.parse(localStorage.getItem("products"));
if(adminProductsFix && adminProductsFix.length > 0){
defaultProducts = adminProductsFix;
loadProducts(defaultProducts);
}
})();
function showForgot(){document.getElementById("forgotBox").style.display="block";}
function closeForgot(){document.getElementById("forgotBox").style.display="none";}
function resetPassword(){
let user=document.getElementById("resetUser").value;
let pass=document.getElementById("newPass").value;
let data=JSON.parse(localStorage.getItem("user"));
if(data && data.user===user){
data.pass=pass;
localStorage.setItem("user",JSON.stringify(data));
alert("Password updated successfully");
closeForgot();
}else{alert("User not found");}
}


</script>

</body>
</html>
