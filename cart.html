<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f3f3f3;font-family:sans-serif;}

.cart-box{
background:white;padding:20px;border-radius:10px;
margin-top:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

img{
width:80px;height:80px;object-fit:contain;
}

.qty-btn{
padding:5px 10px;
border:none;
background:#ddd;
cursor:pointer;
}

.toast{
position:fixed;bottom:20px;right:20px;
background:black;color:white;padding:10px 20px;
border-radius:5px;display:none;
}
</style>
</head>

<body>

<div class="container">

<h2 class="mt-4">🛒 Your Cart</h2>

<div id="cartItems"></div>

<h3 class="mt-3">Total: $<span id="total">0</span></h3>

<button class="btn btn-success mt-3" onclick="goCheckout()">Checkout</button>
<button class="btn btn-danger mt-3" onclick="clearCart()">Clear Cart</button>

</div>

<div class="toast" id="toast">Updated</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// quantity add panna (default 1)
cart = cart.map(item => ({...item, qty: item.qty || 1}));

function renderCart(){

let container = document.getElementById("cartItems");
container.innerHTML = "";

let total = 0;

if(cart.length === 0){
container.innerHTML = "<h4>Your cart is empty 😢</h4>";
document.getElementById("total").innerText = 0;
return;
}

cart.forEach((item,i)=>{

let subTotal = item.price * item.qty;
total += subTotal;

container.innerHTML += `
<div class="cart-box d-flex justify-content-between align-items-center">

<div class="d-flex align-items-center gap-3">
<img src="${item.img}">
<div>
<h5>${item.name}</h5>
<p>$${item.price}</p>

<div>
<button class="qty-btn" onclick="decreaseQty(${i})">-</button>
<span style="margin:0 10px">${item.qty}</span>
<button class="qty-btn" onclick="increaseQty(${i})">+</button>
</div>

<p class="mt-2">Subtotal: <b>$${subTotal}</b></p>
</div>
</div>

<div>
<button class="btn btn-danger btn-sm" onclick="removeItem(${i})">Remove</button>
</div>

</div>
`;
});

document.getElementById("total").innerText = total;
localStorage.setItem("cart", JSON.stringify(cart));
}

// INCREASE
function increaseQty(i){
cart[i].qty++;
renderCart();
showToast("Quantity Increased");
}

// DECREASE
function decreaseQty(i){
if(cart[i].qty > 1){
cart[i].qty--;
renderCart();
showToast("Quantity Decreased");
}
}

// REMOVE
function removeItem(i){
cart.splice(i,1);
renderCart();
showToast("Item Removed ❌");
}

// CLEAR
function clearCart(){
cart = [];
renderCart();
showToast("Cart Cleared 🗑️");
}

// CHECKOUT
function goCheckout(){
window.location.href = "checkout.html";
}

// TOAST
function showToast(msg){
let t=document.getElementById("toast");
t.innerText = msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",1500);
}

// LOAD
renderCart();

</script>

</body>
</html>
