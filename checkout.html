<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f3f3f3;font-family:sans-serif;}
.box{
background:white;padding:20px;border-radius:10px;
margin-top:30px;box-shadow:0 4px 10px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="container">

<h2 class="mt-4">💳 Checkout</h2>

<div class="box">

<h4>📍 Delivery Address</h4>
<input id="name" class="form-control mb-2" placeholder="Full Name">
<input id="address" class="form-control mb-2" placeholder="Address">
<input id="phone" class="form-control mb-3" placeholder="Phone Number">

<h4>💰 Payment Method</h4>
<select id="payment" class="form-control mb-3">
<option>Cash on Delivery</option>
<option>UPI</option>
<option>Card</option>
</select>

<h4>🧾 Order Summary</h4>
<p>Total: $<span id="total">0</span></p>

<button class="btn btn-success w-100" onclick="placeOrder()">Place Order</button>

</div>

</div>

<script>

// GET DATA
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];

// TOTAL CALCULATION
let total = cart.reduce((sum,item)=> sum + (item.price * (item.qty||1)),0);
document.getElementById("total").innerText = total;

// PLACE ORDER
function placeOrder(){

let name = document.getElementById("name").value;
let address = document.getElementById("address").value;
let phone = document.getElementById("phone").value;
let payment = document.getElementById("payment").value;

if(!name || !address || !phone){
alert("Fill all details ❗");
return;
}

// ORDER OBJECT
let order = {
id: "ORD" + Math.floor(Math.random()*100000),
items: cart,
total: total,
name,
address,
phone,
payment,
status: "Ordered",
date: new Date().toLocaleString()
};

// SAVE ORDER
orders.push(order);
localStorage.setItem("orders", JSON.stringify(orders));

// CLEAR CART
localStorage.removeItem("cart");

// REDIRECT
window.location.href = "success.html";
}

</script>

</body>
</html>
