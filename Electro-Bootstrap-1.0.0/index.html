<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sivaniki Electronics Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f5f5;
}

.header{
background:#0d6efd;
color:white;
padding:20px;
text-align:center;
}

.product{
border:1px solid #ddd;
padding:15px;
text-align:center;
background:white;
border-radius:10px;
margin-bottom:20px;
}

.product img{
width:200px;
}

.price{
font-size:20px;
color:green;
}

.old{
text-decoration:line-through;
color:red;
}

.badge-off{
background:red;
color:white;
padding:5px 10px;
border-radius:5px;
}

</style>

</head>

<body>

<!-- Header -->

<div class="header">
<h1>Sivaniki Electronics</h1>
<p>Welcome to Our Shop</p>
<h4>Cart Items: <span id="cartCount">0</span></h4>
</div>

<div class="container mt-5">

<div class="row">

<!-- Product 1 -->

<div class="col-md-3">

<div class="product">

<span class="badge-off">20% OFF</span>

<br><br>

<img src="img/tv.jpg">

<h2>LED TV</h2>

<p class="price">
<span class="old">$60</span> $50
</p>

<p>⭐⭐⭐⭐☆</p>

<button onclick="addCart()" class="btn btn-primary">Add to Cart</button>

<button class="btn btn-success">Buy Now</button>

</div>

</div>

<!-- Product 2 -->

<div class="col-md-3">

<div class="product">

<span class="badge-off">New</span>

<br><br>

<img src="img/watch.jpg">

<h2>Smart Watch</h2>

<p class="price">
<span class="old">$100</span> $80
</p>

<p>⭐⭐⭐⭐⭐</p>

<button onclick="addCart()" class="btn btn-primary">Add to Cart</button>

<button class="btn btn-success">Buy Now</button>

</div>

</div>

<!-- Product 3 -->

<div class="col-md-3">

<div class="product">

<span class="badge-off">15% OFF</span>

<br><br>

<img src="img/camera.webp">

<h2>Digital Camera</h2>

<p class="price">
<span class="old">$150</span> $120
</p>

<p>⭐⭐⭐⭐☆</p>

<button onclick="addCart()" class="btn btn-primary">Add to Cart</button>

<button class="btn btn-success">Buy Now</button>

</div>

</div>

<!-- Product 4 -->

<div class="col-md-3">

<div class="product">

<span class="badge-off">Hot</span>

<br><br>

<img src="img/bluetooth.jpg">

<h2>Bluetooth Speaker</h2>

<p class="price">
<span class="old">$90</span> $70
</p>

<p>⭐⭐⭐⭐⭐</p>

<button onclick="addCart()" class="btn btn-primary">Add to Cart</button>

<button class="btn btn-success">Buy Now</button>

</div>

</div>

</div>

</div>

<script>

let cart = 0;

function addCart(){

cart++;

document.getElementById("cartCount").innerText = cart;

}

</script>

</body>

</html>
