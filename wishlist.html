<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wishlist</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f3f3f3;font-family:sans-serif;}

.box{
background:white;padding:15px;border-radius:10px;
margin-top:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:0.3s;
}

.box:hover{transform:scale(1.02);}

img{
width:80px;height:80px;object-fit:contain;
}

.heart{
font-size:22px;
cursor:pointer;
transition:0.3s;
}

.heart:hover{
transform:scale(1.3);
color:red;
}
</style>

</head>

<body>

<div class="container">

<h2 class="mt-4">❤️ Wishlist</h2>

<button class="btn btn-danger mb-3" onclick="clearWishlist()">🗑️ Clear All</button>

<div id="wishlist"></div>

</div>

<script>

let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// RENDER
function render(){

let container = document.getElementById("wishlist");
container.innerHTML = "";

if(wishlist.length === 0){
container.innerHTML = "<h4>Your wishlist is empty 😢</h4>";
return;
}

wishlist.forEach((item,i)=>{

container.innerHTML += `
<div class="box d-flex justify-content-between align-items-center">

<div class="d-flex align-items-center gap-3">
<img src="${item.img}" 
onerror="this.src='https://cdn-icons-png.flaticon.com/512/2748/2748558.png'">

<div>
<h5>${item.name}</h5>
<p>$${item.price}</p>
</div>
</div>

<div class="d-flex gap-2 align-items-center">

<span class="heart" onclick="removeItem(${i})">❤️</span>

<button class="btn btn-success btn-sm" onclick="moveToCart(${i})">
🛒 Add to Cart
</button>

</div>

</div>
`;

});

}

// MOVE TO CART (NO DUPLICATE)
function moveToCart(i){

let exists = cart.find(p => p.name === wishlist[i].name);

if(!exists){
cart.push(wishlist[i]);
localStorage.setItem("cart", JSON.stringify(cart));
alert("Added to Cart ✅");
}else{
alert("Already in Cart ⚠️");
}

wishlist.splice(i,1);
localStorage.setItem("wishlist", JSON.stringify(wishlist));

render();
}

// REMOVE ITEM
function removeItem(i){
wishlist.splice(i,1);
localStorage.setItem("wishlist", JSON.stringify(wishlist));
render();
}

// CLEAR ALL
function clearWishlist(){

if(confirm("Are you sure to clear wishlist?")){
wishlist = [];
localStorage.setItem("wishlist", JSON.stringify(wishlist));
render();
}

}

// LOAD
render();

</script>

</body>
</html>
